spring.application.name=campus-workforce-system

# ---------- Database ----------
spring.datasource.url=jdbc:mysql://localhost:3306/cwtms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema is created manually via database/schema.sql -> keep Hibernate in "validate" mode
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------- Server ----------
server.port=8080

# ---------- Local file storage (no cloud, no paid service) ----------
app.upload.dir=uploads

# ---------- JWT ----------
# Replace with your own long random secret (32+ chars) before running in any real setting
app.jwt.secret=ChangeThisSecretKeyToSomethingLongAndRandomForCWTMS2026Project
app.jwt.expiration-ms=86400000

# ---------- File upload limits ----------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=100MB

# ---------- CORS (frontend dev server) ----------
app.cors.allowed-origins=http://localhost:5173

# ---------- SMTP Email Settings (Uncomment and configure for live emails) ----------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

