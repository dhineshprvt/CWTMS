spring.application.name=campus-workforce-system

# ---------- Database ----------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cwtms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Schema is created manually via database/schema.sql -> keep Hibernate in "validate" mode
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------- Server ----------
server.port=8080

# ---------- Local file storage (no cloud, no paid service) ----------
app.upload.dir=uploads

# ---------- JWT ----------
# Replace with your own long random secret (32+ chars) before running in any real setting
app.jwt.secret=${APP_JWT_SECRET:ChangeThisSecretKeyToSomethingLongAndRandomForCWTMS2026Project}
app.jwt.expiration-ms=86400000

# ---------- File upload limits ----------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=100MB

# ---------- CORS (frontend dev server) ----------
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---------- SMTP Email Settings (Active for live emails) ----------
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:myproject.testing0@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:@myprojecttesting}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

